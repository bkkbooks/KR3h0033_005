body:
  text: 書評一卷鍾繇書如雲鵠游天群鳧戲海行間茂密實亦難過王羲之書如龍跳天門虎臥鳳闕是故歷代寶之永以為訓張芝書如漢武愛道憑虛欲仙蔡雍書骨氣洞達奕奕如有神力韋誕書如龍威虎振劍拔弩張蕭子雲書如危峰阻日孤松一枝荊軻負劍壯士彎弓雄人獵虎心胸猛烈鋒刃難當羊欣書如大家婢作夫人不堪位置而舉止羞澀終不似真也李鎮東書如芙蕖出水文彩鮮明似刻金銀乃有舒蹙勢王獻之書絶衆超群無人可擬如河朔少年皆悉充悅舉止沓拖不可耐何索靖書如王謝家子弟縱復不端正奕奕有一種豪氣也王僧虔書如飄風忽舉鷙鳥乍飛顏倩書如貧家奠果無妨可愛少乏珍羞阮研書如貴胄失品次不復排突英賢也王褒書悽斷風流而勢不稱貌意深工淺猶未當妙師宜官書如鴻羽未息舉翮而自退也鍾會書有十二種意外奇妙陶隱居書如吳興小兒形容雖未成長而骨體甚峭快蕭特進書雖有家風而風流勢薄猶如大小王安得相似王彬之書放縱快利筆道流便也范懷約真書有力而行草無功施肩吾書如新亭傖父一往似揚州人共語意便態生柳渾書縱橫廓落大體不凡而意未備郗愔書得意甚熟而取妙特難踈散風氣不無雅素庚肩吾書畏懼收斂少得自充效未精能去蕭蔡遠矣徐淮南書如南岡士大夫徒愛風範然不寒乞也袁嵩書如深山道士見人便欲縮退張斯書如辨士對獨語不回得心會理薄紹之書亦有一家風氣未為冠絶也
